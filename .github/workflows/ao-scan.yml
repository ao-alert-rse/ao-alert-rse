name: AO Alert — Scan hebdomadaire RSE/TEE

on:
  schedule:
    # Prévu à 01h00 UTC (03h00 CEST été / 02h00 CET hiver) : GitHub Actions retarde
    # régulièrement les workflows planifiés de 5 à 11h (observé sur 6 jours consécutifs,
    # 03-08/07/2026) — avancé pour que le déclenchement réel retombe plutôt vers 6h-12h UTC
    # (8h-14h Paris) au lieu de 11h-17h UTC. Pas une garantie d'heure fixe, juste une
    # compensation empirique de la dérive observée.
    - cron: '0 1 * * *'
  workflow_dispatch:        # déclenchement manuel depuis GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # pour commiter ao-history.json après le scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scan
        run: node index.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Commit ao-history.json
        run: |
          git config user.name  "ao-alert[bot]"
          git config user.email "ao-alert@users.noreply.github.com"
          git add data/ao-history.json data/scan-log.json rapport.html
          git diff --cached --quiet || git commit -m "scan $(date -u +%Y-%m-%d)"
          # Rebase avant de pousser au cas où main a bougé depuis le checkout
          # (évite un push rejeté si un commit manuel a eu lieu entre-temps).
          git pull --rebase origin main
          git push
